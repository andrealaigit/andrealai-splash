:root{ --ink:#000000; --paper:#f1ede6; --muted:#96907f; --accent:#ff2e1f; }
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
html{color-scheme:dark;}
body{background:var(--ink); color:var(--paper);
  font-family:'Swiza','Helvetica Neue',Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; min-height:100svh; overflow-x:hidden;}

.stage{min-height:100svh; display:grid; grid-template-rows:48svh auto;}

.portrait{position:relative; margin:0; overflow:hidden;}
.portrait img{width:100%; height:100%; object-fit:contain; object-position:center bottom; display:block;
  -webkit-mask-image:radial-gradient(115% 100% at 50% 62%, #000 10%, rgba(0,0,0,.72) 42%, rgba(0,0,0,.32) 66%, rgba(0,0,0,.08) 84%, transparent 100%);
  mask-image:radial-gradient(115% 100% at 50% 62%, #000 10%, rgba(0,0,0,.72) 42%, rgba(0,0,0,.32) 66%, rgba(0,0,0,.08) 84%, transparent 100%);}
.portrait::after{content:""; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(120% 100% at 50% 60%, rgba(0,0,0,0) 34%, rgba(0,0,0,.5) 66%, var(--ink) 92%);}

.content{display:flex; align-items:center; padding:clamp(1.6rem,6vw,4rem) clamp(1.4rem,7vw,5rem) clamp(2.2rem,6vw,4rem);}
.col{width:100%; max-width:40rem; display:flex; flex-direction:column; gap:clamp(1.1rem,3vw,1.7rem);}

.name{margin:0; line-height:.92; letter-spacing:-.045em; white-space:nowrap; font-size:clamp(2.7rem,8.2vw,6rem);}
.name .a{font-weight:200; color:var(--paper);}
.name .l{font-weight:700;}
.dot{display:inline-block; width:.12em; height:.12em; margin-left:.15em; border-radius:50%;
  background:var(--accent); vertical-align:.16em; box-shadow:0 0 16px 3px rgba(255,46,31,.45);}

.desc{margin:0; font-weight:300; font-style:italic; white-space:nowrap; font-size:clamp(.72rem,3.15vw,1.3rem); line-height:1.42; color:var(--paper);}

/* link come icone cliccabili */
.links{list-style:none; margin:.6rem 0 0; padding:0; display:flex; flex-direction:row; align-items:center; gap:clamp(1rem,3vw,1.5rem);}
.links a{position:relative; display:inline-flex; color:var(--paper); transition:color .25s ease, transform .25s ease;}
.links a svg{width:clamp(1.4rem,4.4vw,1.6rem); height:clamp(1.4rem,4.4vw,1.6rem); display:block;}
.links a:hover, .links a:focus-visible{color:var(--accent); transform:translateY(-2px);}
.links a:focus-visible{outline:2px solid var(--accent); outline-offset:6px; border-radius:5px;}
.links a::after{content:attr(data-label); position:absolute; left:50%; top:calc(100% + .55rem); transform:translateX(-50%);
  font-size:.66rem; font-weight:400; font-style:italic; letter-spacing:.03em; color:var(--accent); white-space:nowrap;
  opacity:0; transition:opacity .2s ease; pointer-events:none;}
.links a:hover::after, .links a:focus-visible::after{opacity:1;}

.foot{margin-top:clamp(1.6rem,4vw,2.4rem); font-weight:300; font-size:.82rem; letter-spacing:.02em; color:var(--muted); opacity:.9;}

@media (prefers-reduced-motion:no-preference){
  .reveal{opacity:0; transform:translateY(14px); animation:rise .9s cubic-bezier(.2,.7,.2,1) forwards;}
  .d1{animation-delay:.08s} .d2{animation-delay:.20s} .d3{animation-delay:.34s} .d4{animation-delay:.48s}
  .portrait img{animation:sink 1.6s cubic-bezier(.2,.7,.2,1) forwards, breathe 16s ease-in-out 1.6s infinite; transform:scale(1.05);}
  .dot{animation:glow 4.6s ease-in-out infinite;}
  @keyframes rise{to{opacity:1; transform:none;}}
  @keyframes sink{to{transform:scale(1);}}
  @keyframes breathe{0%,100%{transform:scale(1);} 50%{transform:scale(1.03);}}
  @keyframes glow{0%,100%{box-shadow:0 0 12px 2px rgba(255,46,31,.35); opacity:.88;} 50%{box-shadow:0 0 24px 5px rgba(255,46,31,.7); opacity:1;}}
}

@media (min-width:820px){
  .stage{grid-template-rows:none; grid-template-columns:1.05fr .95fr; min-height:100svh;}
  .content{order:1;}
  .col{margin-left:3cm;}
  .portrait{order:2; height:100svh;}
  .portrait img{object-position:right center;
    -webkit-mask-image:radial-gradient(82% 100% at 64% 50%, #000 8%, rgba(0,0,0,.7) 40%, rgba(0,0,0,.3) 66%, rgba(0,0,0,.07) 85%, transparent 100%);
    mask-image:radial-gradient(82% 100% at 64% 50%, #000 8%, rgba(0,0,0,.7) 40%, rgba(0,0,0,.3) 66%, rgba(0,0,0,.07) 85%, transparent 100%);}
  .portrait::after{background:radial-gradient(85% 100% at 64% 50%, rgba(0,0,0,0) 32%, rgba(0,0,0,.5) 66%, var(--ink) 94%);}
}
</style>
